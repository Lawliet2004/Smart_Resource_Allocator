{% extends "base.html" %}

{% block title %}Volunteer Profile - Smart Resource Allocator{% endblock %}

{% block content %}
<section class="mb-6">
  <h1 class="text-2xl font-semibold">Profile</h1>
</section>

<form method="post" action="/v/profile" class="grid gap-6 lg:grid-cols-[1fr_.9fr]">
  <section class="space-y-4 rounded border border-slate-200 bg-white p-5">
    <label class="form-field">
      <span>Name</span>
      <input class="input" type="text" name="name" value="{{ profile.name }}" required>
    </label>
    <label class="form-field">
      <span>Phone</span>
      <input class="input" type="tel" name="phone_number" value="{{ profile.phone_number or '' }}">
    </label>
    <label class="form-field">
      <span>Location</span>
      <input class="input" type="text" name="location" id="location-input" value="{{ profile.location or '' }}">
    </label>
    <input type="hidden" name="latitude" id="latitude-input" value="{{ profile.latitude if profile.latitude is not none else '' }}">
    <input type="hidden" name="longitude" id="longitude-input" value="{{ profile.longitude if profile.longitude is not none else '' }}">
    <label class="flex items-center gap-3 text-sm font-medium text-slate-700">
      <input class="h-4 w-4 rounded border-slate-300" type="checkbox" name="is_available" {% if profile.is_available %}checked{% endif %}>
      Available for new tasks
    </label>
    <button class="btn-primary" type="submit">Save profile</button>
  </section>

  <section class="space-y-4 rounded border border-slate-200 bg-white p-5">
    <div>
      <h2 class="font-semibold">Skills</h2>
      <div class="mt-3 grid gap-2 sm:grid-cols-2">
        {% for value, label in skills %}
          <label class="checkbox-row">
            <input type="checkbox" name="skills" value="{{ value }}" {% if value in (profile.skills or []) %}checked{% endif %}>
            <span>{{ label }}</span>
          </label>
        {% endfor %}
      </div>
    </div>
    <div>
      <h2 class="mb-3 font-semibold">Map Pin</h2>
      <div id="profile-map" class="map-box"></div>
    </div>
  </section>
</form>

<script>
  if (window.L) {
    const latInput = document.getElementById("latitude-input");
    const lngInput = document.getElementById("longitude-input");
    const hasPoint = latInput.value && lngInput.value;
    const start = hasPoint ? [Number(latInput.value), Number(lngInput.value)] : [22.5726, 88.3639];
    const map = L.map("profile-map").setView(start, hasPoint ? 12 : 5);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 19 }).addTo(map);
    let marker = L.marker(start).addTo(map);
    map.on("click", (event) => {
      marker.setLatLng(event.latlng);
      latInput.value = event.latlng.lat.toFixed(6);
      lngInput.value = event.latlng.lng.toFixed(6);
    });
  }
</script>
{% endblock %}
