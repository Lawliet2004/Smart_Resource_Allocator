<article class="rounded border border-slate-200 bg-white p-4">
  <div class="flex flex-wrap items-start justify-between gap-3">
    <div>
      <h3 class="font-semibold">{{ task.title }}</h3>
      <p class="mt-1 text-sm text-slate-600">{{ task.location or "Location TBD" }}</p>
    </div>
    <span class="badge">Urgency {{ task.urgency }}</span>
  </div>
  {% if task.description %}
    <p class="mt-3 line-clamp-3 text-sm text-slate-700">{{ task.description }}</p>
  {% endif %}
  <div class="mt-3 flex flex-wrap gap-2">
    {% for skill in task.required_skills or [] %}
      <span class="skill-chip">{{ skill|skill_label }}</span>
    {% else %}
      <span class="skill-chip">General support</span>
    {% endfor %}
  </div>
  <div class="mt-4 flex items-center justify-between gap-3">
    <span class="text-xs font-medium uppercase tracking-wide text-slate-500">{{ task.status }}</span>
  </div>
</article>
