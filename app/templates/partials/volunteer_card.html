<article class="rounded border border-slate-200 bg-white p-4">
  <div class="flex items-start justify-between gap-3">
    <div>
      <h3 class="font-semibold">{{ volunteer.name }}</h3>
      <p class="mt-1 text-sm text-slate-600">{{ volunteer.location or "Location TBD" }}</p>
    </div>
    {% if volunteer.is_available %}
      <span class="badge-green">Available</span>
    {% else %}
      <span class="badge">Unavailable</span>
    {% endif %}
  </div>
  <div class="mt-3 flex flex-wrap gap-2">
    {% for skill in volunteer.skills or [] %}
      <span class="skill-chip">{{ skill|skill_label }}</span>
    {% else %}
      <span class="skill-chip">No skills set</span>
    {% endfor %}
  </div>
</article>
