services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-sra}
    volumes:
      - sra_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-sra}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sra}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      APP_ENV: ${APP_ENV:-production}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      # Set to true ONLY when a trusted reverse proxy terminates TLS and
      # overwrites X-Forwarded-For. Otherwise clients can spoof the header
      # to bypass rate limits.
      TRUST_FORWARDED_HEADERS: ${TRUST_FORWARDED_HEADERS:-false}
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  sra_pgdata:
